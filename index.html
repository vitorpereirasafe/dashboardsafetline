<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCP — Planejamento de Injeção</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1a2b; --surface:#112033; --surface2:#163050;
  --border:#1e3a5a; --green:#00e676; --yellow:#ffd600; --red:#ff1744;
  --text:#d6e8f5; --muted:#4a6a85; --accent:#4da6d6;
  --blue1:#1a4a7a; --blue2:#1e5a96; --blue3:#2e7ab8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(30,90,150,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(30,90,150,.05) 1px,transparent 1px);
  background-size:40px 40px;
}
body::after{
  content:'vitor emanuel';position:fixed;bottom:5px;left:10px;
  font-size:.5rem;color:rgba(160,200,235,.3);letter-spacing:.18em;
  pointer-events:none;z-index:9999;user-select:none;
}

/* ROOT */
#root{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100vh;padding:8px;gap:6px;
}

/* TOPBAR */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--blue1),var(--blue2) 60%,var(--blue3));
  border:1px solid #2a5a8a;border-radius:7px;
  padding:6px 14px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(10,30,60,.5);
}
.brand{font-weight:900;font-size:1.2rem;letter-spacing:.12em;text-transform:uppercase;color:#fff;}
.divv{width:1px;height:20px;background:rgba(255,255,255,.25);margin:0 10px;}
.subtext{font-size:.68rem;color:rgba(255,255,255,.6);}
.topbar-logo{display:flex;align-items:center;gap:6px;}
.topbar-right{display:flex;gap:7px;align-items:center;}
.chip{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:5px;padding:3px 11px;text-align:center;
}
.chip .val{font-size:1.1rem;font-weight:700;line-height:1;}
.chip .lbl{font-size:.55rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em;}
.chip.g .val{color:var(--green);}
.chip.y .val{color:var(--yellow);}
.chip.b .val{color:var(--accent);}
.btn-folder{
  padding:5px 13px;border-radius:5px;border:1px solid var(--accent);
  background:rgba(77,166,214,.1);color:var(--accent);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
.btn-folder:hover{background:var(--accent);color:#04263a;}
.btn-folder.connected{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.1);}
.btn-folder.connected:hover{background:var(--green);color:#062;}
.btn-excel{
  padding:5px 13px;border-radius:5px;border:1px solid var(--green);
  background:rgba(0,230,118,.1);color:var(--green);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
.btn-excel:hover{background:var(--green);color:#062;}
.btn-reset{
  padding:5px 13px;border-radius:5px;border:1px solid var(--red);
  background:rgba(255,23,68,.1);color:var(--red);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
.btn-reset:hover{background:var(--red);color:#fff;}

/* GRID 2x2 (resizable via gutters) */
#grid{
  display:grid;
  grid-template-columns:1fr 6px 1fr;
  grid-template-rows:1fr 6px 1fr;
  flex:1;min-height:0;
}
.gutter{position:relative;background:transparent;z-index:2;}
.gutter-col{cursor:col-resize;grid-row:1 / span 3;}
.gutter-row{cursor:row-resize;grid-column:1 / span 3;}
.gutter::after{
  content:'';position:absolute;background:var(--border);
  transition:background .15s;
}
.gutter-col::after{top:0;bottom:0;left:2px;width:2px;}
.gutter-row::after{left:0;right:0;top:2px;height:2px;}
.gutter:hover::after,.gutter.active::after{background:var(--accent);}

/* PAINEL */
.panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;display:flex;flex-direction:column;
  overflow:hidden;min-height:0;flex:1;min-width:0;
}
.panel.loaded{border-color:rgba(77,166,214,.35);}

.phead{
  display:flex;align-items:center;gap:7px;padding:5px 10px;
  background:linear-gradient(90deg,var(--blue1),var(--blue2));
  border-bottom:1px solid #1e3a5a;flex-shrink:0;
}
.pslot{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;white-space:nowrap;}
.pname{font-size:.9rem;font-weight:700;color:rgba(255,255,255,.9);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pinj{font-size:1.35rem;font-weight:900;color:#fff;white-space:nowrap;letter-spacing:.04em;}
.pstats{display:flex;gap:4px;font-size:.72rem;white-space:nowrap;}
.ps-ok{color:var(--green);}
.ps-pend{color:var(--yellow);}

/* UPLOAD */
.upzone{
  border:1px dashed var(--border);border-radius:5px;
  padding:5px 8px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--bg);
  margin:5px 6px 0;flex-shrink:0;
}
.upzone:hover,.upzone.drag{border-color:var(--blue3);background:rgba(46,122,184,.06);}
.upzone input{display:none;}
.uptxt{color:var(--muted);font-size:.67rem;line-height:1.4;}
.uptxt span{color:#7ab8e0;font-weight:600;}
.upzone.ok{border-color:rgba(0,230,118,.4);background:rgba(0,230,118,.04);padding:3px 8px;}
.upzone.ok .uptxt{color:rgba(0,230,118,.75);font-size:.62rem;}
.upzone.loading{border-color:var(--blue3);cursor:wait;}
.upzone.err .uptxt{color:var(--red);}
.spin{
  display:inline-block;width:11px;height:11px;
  border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:4px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* SCROLL GIROS */
.gscroll{flex:1;overflow-y:auto;padding:6px 6px 8px;min-height:0;}
.gscroll::-webkit-scrollbar{width:4px;}
.gscroll::-webkit-scrollbar-track{background:transparent;}
.gscroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* GIRO */
.gbloco{margin-bottom:8px;}
.gbloco:last-child{margin-bottom:0;}
.glabel{display:flex;align-items:center;gap:6px;padding:3px 4px 4px;margin-bottom:4px;}
.gnum{font-size:1rem;font-weight:900;color:var(--accent);}
.gcnt{font-size:.65rem;color:var(--muted);}
.gprog{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;max-width:55px;}
.gprogfill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .4s;}
.pgrupo{margin-bottom:6px;}
.pgrupo:last-child{margin-bottom:0;}
.plabel{font-size:.62rem;font-weight:800;letter-spacing:.04em;color:var(--yellow);text-transform:uppercase;padding:0 4px 3px;opacity:.85;}
.gstatus{font-size:.58rem;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.06em;}
.gstatus.aguardando{background:var(--border);color:var(--muted);}
.gstatus.iniciado{background:rgba(255,214,0,.12);color:var(--yellow);border:1px solid rgba(255,214,0,.35);}
.gstatus.completo{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.35);}

/* REMESSA GRID */
.rgrid{display:flex;flex-wrap:wrap;gap:3px;align-items:flex-start;}
.tile{flex:0 0 auto;min-width:68px;}

/* TILE */
.tile{
  border:1px solid var(--border);border-radius:4px;
  background:var(--bg);padding:3px 5px;
  cursor:pointer;user-select:none;
  transition:background .12s,border-color .12s,opacity .12s;
  display:flex;flex-direction:column;gap:0;
}
.tile:hover{border-color:rgba(77,166,214,.5);}
.tile.click1{border-color:rgba(77,166,214,.6);background:rgba(77,166,214,.07);}
.tile.done{background:rgba(0,230,118,.14)!important;border-color:rgba(0,230,118,.55)!important;}
.tile.done .tcode{color:var(--green);}
.tile.done .tmodel{color:rgba(0,230,118,.75);}
.tile.out{animation:tileOut .28s ease forwards;pointer-events:none;}
@keyframes tileOut{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(.8);}}

.tcode{font-family:'JetBrains Mono',monospace;font-size:.5rem;font-weight:400;color:var(--text);line-height:1.1;word-break:break-all;}
.tmodel{font-size:.92rem;font-weight:600;color:var(--yellow);white-space:nowrap;line-height:1.15;}

/* EMPTY */
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.75rem;text-align:center;padding:8px;}

/* TOAST */
.toast{
  position:fixed;bottom:14px;right:14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;padding:8px 14px;font-size:.78rem;
  z-index:1000;opacity:0;transform:translateY(8px);
  transition:all .25s;pointer-events:none;max-width:280px;
}
.toast.show{opacity:1;transform:translateY(0);}
.toast.s{border-color:var(--green);color:var(--green);}
.toast.w{border-color:var(--yellow);color:var(--yellow);}
.toast.e{border-color:var(--red);color:var(--red);}

/* GIRO OUT (giro completo some) */
.gOut{overflow:hidden;animation:giroOut .5s ease forwards;}
@keyframes giroOut{
  0%{opacity:1;transform:scale(1);max-height:600px;margin-bottom:8px;}
  100%{opacity:0;transform:scale(.94);max-height:0;margin-bottom:0;padding-top:0;padding-bottom:0;}
}

/* CHIP extra (giros/planos hoje) */
.chip.p{cursor:pointer;transition:background .15s;}
.chip.p:hover{background:rgba(255,255,255,.18);}
.chip.p .val{color:#ce93d8;}
.chip.p2{cursor:pointer;transition:background .15s;}
.chip.p2:hover{background:rgba(255,255,255,.18);}
.chip.p2 .val{color:var(--green);}

/* BOTÃO "+ Inserir Planos" (modo maximizado) */
.btn-addplans{
  padding:4px 13px;border-radius:5px;border:1px solid var(--accent);
  background:rgba(77,166,214,.12);color:var(--accent);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;
  letter-spacing:.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;
  transition:all .15s;
}
.btn-addplans:hover{background:var(--accent);color:#0d1a2b;}

.modal-section-title{
  font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--yellow);margin-bottom:6px;
}

/* MODAL — GIROS FINALIZADOS HOJE */
.modal-overlay{
  position:fixed;inset:0;background:rgba(4,10,20,.72);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:2000;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  width:min(430px,92vw);max-height:80vh;display:flex;flex-direction:column;
  box-shadow:0 10px 40px rgba(0,0,0,.55);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;background:linear-gradient(90deg,var(--blue1),var(--blue2));
  border-bottom:1px solid var(--border);border-radius:10px 10px 0 0;
  font-weight:700;font-size:.92rem;letter-spacing:.02em;color:#fff;
}
.modal-close{background:none;border:none;color:#fff;font-size:1rem;cursor:pointer;opacity:.75;line-height:1;}
.modal-close:hover{opacity:1;}
.modal-body{padding:12px 16px;overflow-y:auto;}
.modal-total{
  font-size:.8rem;color:var(--muted);margin-bottom:10px;padding-bottom:9px;
  border-bottom:1px solid var(--border);
}
.modal-total strong{color:var(--green);font-size:1.15rem;}
.modal-empty{color:var(--muted);font-size:.8rem;text-align:center;padding:22px 0;}
.modal-row{padding:8px 2px;border-bottom:1px solid rgba(30,58,90,.5);}
.modal-row:last-child{border-bottom:none;}
.modal-rowhead{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.modal-key{font-weight:700;font-size:.85rem;color:var(--accent);}
.modal-count{font-size:.8rem;color:var(--green);font-weight:700;white-space:nowrap;}
.modal-plano{font-size:.68rem;color:var(--muted);margin-top:2px;}
</style>
</head>
<body>
<div id="root">
  <div id="topbar">
    <div style="display:flex;align-items:center;">
      <div class="brand">PCP</div>
      <div class="divv"></div>
      <div class="subtext">Planejamento de Injeção — 4 planos simultâneos</div>
    </div>
    <div class="topbar-logo">
      <svg width="110" height="28" viewBox="0 0 110 28" fill="none">
        <rect x="0" y="2" width="18" height="4" rx="1.5" fill="white"/>
        <rect x="0" y="10" width="18" height="4" rx="1.5" fill="white"/>
        <rect x="0" y="18" width="18" height="4" rx="1.5" fill="white"/>
        <rect x="9" y="2" width="9" height="4" fill="rgba(30,90,150,0.9)"/>
        <rect x="0" y="18" width="9" height="4" fill="rgba(30,90,150,0.9)"/>
        <rect x="24" y="4" width="14" height="3" rx="1.2" fill="rgba(255,255,255,0.85)"/>
        <rect x="24" y="11" width="14" height="3" rx="1.2" fill="rgba(255,255,255,0.85)"/>
        <rect x="24" y="18" width="14" height="3" rx="1.2" fill="rgba(255,255,255,0.85)"/>
        <text x="44" y="19" font-family="'Barlow Condensed',sans-serif" font-weight="700" font-size="14" fill="white" letter-spacing="0.5">Safetline</text>
        <text x="103" y="10" font-family="'Barlow Condensed',sans-serif" font-size="7" fill="rgba(255,255,255,0.7)">®</text>
      </svg>
    </div>
    <div class="topbar-right">
      <div class="chip g"><div class="val" id="s-ent">0</div><div class="lbl">Entregues</div></div>
      <div class="chip y"><div class="val" id="s-pend">0</div><div class="lbl">Pendentes</div></div>
      <div class="chip b"><div class="val" id="s-tot">0</div><div class="lbl">Total</div></div>
      <div class="chip p" onclick="openResumoModal()" title="Ver detalhes"><div class="val" id="s-giroshoje">0</div><div class="lbl">Giros Hoje</div></div>
      <div class="chip p2" onclick="openResumoModal()" title="Ver detalhes"><div class="val" id="s-planoshoje">0</div><div class="lbl">Planos Hoje</div></div>
      <button id="btnFolder" class="btn-folder" onclick="chooseHistoryFolder()" title="Escolha uma pasta (ex: drive de rede) e o Excel será atualizado sozinho ali a cada giro/planejamento finalizado">🔗 Ativar pasta automática</button>
      <button class="btn-excel" onclick="downloadHistoricoExcel()" title="Baixar histórico completo em Excel">⬇ Histórico Excel</button>
      <button class="btn-reset" onclick="resetAll()">↺ Reset</button>
    </div>
  </div>
  <div id="grid"></div>
</div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="girosModalOverlay" onclick="closeGirosHojeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span>📊 Resumo do dia</span>
      <button class="modal-close" onclick="closeGirosHojeModal()">✕</button>
    </div>
    <div class="modal-body" id="girosModalBody"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── CONFIG ──
const SLOTS  = [0,1,2,3];
const LABELS = ['Plano A','Plano B','Plano C','Plano D'];
const COLORS = ['#4da6d6','#ce93d8','#ffd600','#00e676'];
const DBL_MS = 380;

let plans = SLOTS.map(i => ({id:i, plano:'', injetora:'', giros:[]}));
const cst  = {};
let toastTimer;

// ── LOG DE GIROS E PLANOS FINALIZADOS (para o painel "Giros/Planos Hoje" e para o histórico em Excel) ──
let completedLog = [];      // giros: {pi, plano, injetora, giroLabel, ts}
let completedPlansLog = []; // planos: {pi, id, plano, ts}

// ── PERSISTÊNCIA DO HISTÓRICO (localStorage) ──
// Guarda tudo que já foi finalizado, dia após dia, mesmo depois de fechar/atualizar
// a página. Isso é o que alimenta o botão "Histórico Excel".
const HK_GIROS  = 'pcp_history_giros';
const HK_PLANOS = 'pcp_history_planos';

function loadHistory() {
  try {
    const g = localStorage.getItem(HK_GIROS);
    const p = localStorage.getItem(HK_PLANOS);
    completedLog      = g ? JSON.parse(g) : [];
    completedPlansLog = p ? JSON.parse(p) : [];
  } catch(e) {
    console.error('Erro ao carregar histórico salvo:', e);
    completedLog = [];
    completedPlansLog = [];
  }
}

function saveHistory() {
  try {
    localStorage.setItem(HK_GIROS, JSON.stringify(completedLog));
    localStorage.setItem(HK_PLANOS, JSON.stringify(completedPlansLog));
  } catch(e) {
    console.error('Erro ao salvar histórico:', e);
    toast('Não foi possível salvar o histórico localmente', 'e');
  }
}

function isToday(ts) {
  const d = new Date(ts), n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}

// Identificador curto do plano (ex: "622 - 622 - 2114" ou "458"), usado nas mensagens
function getPlanIdentifier(p) {
  if (p.injetora) return p.injetora.replace(/\s+/g,' ').trim();
  if (p.plano) {
    const m = p.plano.match(/(\d[\d\s\-\/]*\d|\d+)\s*$/);
    if (m) return m[1].replace(/\s+/g,' ').trim();
  }
  return p.plano || 'sem identificação';
}

function logGiroCompleted(pi, giro) {
  const p = plans[pi];
  completedLog.push({
    pi,
    plano   : p.plano,
    injetora: p.injetora,
    giroLabel: giro.label || ('Giro ' + giro.num),
    ts: Date.now()
  });
  saveHistory();
  updateGirosHojeChip();
  autoSaveHistoricoToFolder();
}

function updateGirosHojeChip() {
  const el = document.getElementById('s-giroshoje');
  if (el) el.textContent = completedLog.filter(e => isToday(e.ts)).length;
}

function logPlanCompleted(pi, plano, id) {
  completedPlansLog.push({ pi, id, plano, ts: Date.now() });
  saveHistory();
  updatePlanosHojeChip();
  autoSaveHistoricoToFolder();
}

function updatePlanosHojeChip() {
  const el = document.getElementById('s-planoshoje');
  if (el) el.textContent = completedPlansLog.filter(e => isToday(e.ts)).length;
}

// PDF.js worker — disable for iframe/sandbox compat
function initPdfJs() {
  if (typeof pdfjsLib === 'undefined') return;
  try { pdfjsLib.GlobalWorkerOptions.workerSrc = ''; } catch(e){}
}

// ── BOOT ──
document.addEventListener('DOMContentLoaded', () => {
  initPdfJs();
  loadHistory();
  updateGirosHojeChip();
  updatePlanosHojeChip();
  renderAll();
  tryRestoreFolderOnBoot();
});

// ── RENDER ──
let expandedView = false; // true = usuário pediu pra ver os 4 quadrantes mesmo com 1 ou 2 planos ativos

function getActiveIdx() {
  return plans.map((p,i) => p.plano ? i : -1).filter(i => i !== -1);
}

// Decide o modo de exibição atual:
//  'solo' -> 1 plano ativo, ocupa a tela toda
//  'duo'  -> 2 planos ativos, dividem a tela toda (sem quadrantes vazios)
//  'grid' -> 3+ planos ativos, ou usuário pediu explicitamente os 4 quadrantes
function getLayoutMode(activeIdx) {
  if (activeIdx.length === 1 && !expandedView) return 'solo';
  if (activeIdx.length === 2 && !expandedView) return 'duo';
  return 'grid';
}

function renderAll() {
  const g = document.getElementById('grid');
  const activeIdx = getActiveIdx();

  if (activeIdx.length === 0) expandedView = false; // nada ativo -> volta ao padrão de 4 quadrantes

  const mode = getLayoutMode(activeIdx);

  if (mode === 'solo') {
    // Só um planejamento rodando -> maximiza ele ocupando toda a tela
    const solo = activeIdx[0];
    g.innerHTML = `
      <div style="grid-column:1 / span 3;grid-row:1 / span 3;display:flex;min-height:0;min-width:0;">
        ${panelHTML(solo, {solo:true})}
      </div>
    `;
  } else if (mode === 'duo') {
    // Dois planejamentos rodando -> dividem a tela toda, sem quadrantes vazios
    const [a, b] = activeIdx;
    g.innerHTML = `
      <div id="duoGrid" style="grid-column:1 / span 3;grid-row:1 / span 3;display:grid;grid-template-columns:1fr 6px 1fr;min-height:0;min-width:0;">
        <div style="grid-column:1;display:flex;min-height:0;min-width:0;">${panelHTML(a, {duo:true})}</div>

    `;
  } else {
    g.innerHTML = `
      <div style="grid-column:1;grid-row:1;display:flex;min-height:0;min-width:0;">${panelHTML(0)}</div>
      <div class="gutter gutter-col" id="gutCol" style="grid-column:2;grid-row:1 / span 3;"></div>
      <div style="grid-column:3;grid-row:1;display:flex;min-height:0;min-width:0;">${panelHTML(1)}</div>

// Botão "+ Inserir Planos": volta pra tela com os 4 quadrantes, mantendo os planos já em andamento

function bindGutters() {
  const grid = document.getElementById('grid');
  const gutCol = document.getElementById('gutCol');
  const gutRow = document.getElementById('gutRow');
  if (!gutCol || !gutRow) return; // modo maximizado (1 plano) não tem gutters

  let dragging = null;
  const MIN = 12; // % minimum size for a track

  function onMove(e) {
    if (!dragging) return;
    const rect = grid.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    if (dragging === 'col') {
      let pct = ((clientX - rect.left) / rect.width) * 100;
      pct = Math.max(MIN, Math.min(100 - MIN, pct));
      grid.style.gridTemplateColumns = `${pct}% 6px ${100 - pct}%`;
    } else if (dragging === 'row') {
      let pct = ((clientY - rect.top) / rect.height) * 100;
      pct = Math.max(MIN, Math.min(100 - MIN, pct));
      grid.style.gridTemplateRows = `${pct}% 6px ${100 - pct}%`;
    }
  }
  function onUp() {
    if (!dragging) return;
    dragging = null;
    gutCol.classList.remove('active');
    gutRow.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
  function startDrag(which) {
    return e => {
      e.preventDefault();
      dragging = which;
      (which==='col'?gutCol:gutRow).classList.add('active');
      document.body.style.cursor = which==='col' ? 'col-resize' : 'row-resize';
      document.body.style.userSelect = 'none';
    };
  }
  gutCol.addEventListener('mousedown', startDrag('col'));
  gutRow.addEventListener('mousedown', startDrag('row'));
  gutCol.addEventListener('touchstart', startDrag('col'), {passive:false});
  gutRow.addEventListener('touchstart', startDrag('row'), {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);

  gutCol.addEventListener('dblclick', () => grid.style.gridTemplateColumns = '1fr 6px 1fr');
  gutRow.addEventListener('dblclick', () => grid.style.gridTemplateRows = '1fr 6px 1fr');
}

// Arrasta o divisor entre os 2 painéis no modo "duo" (2 planos dividindo a tela toda)
function bindDuoGutter() {
  const gutDuo  = document.getElementById('gutDuo');
  const duoGrid = document.getElementById('duoGrid');
  if (!gutDuo || !duoGrid) return; // não está no modo duo

  let dragging = false;
  const MIN = 15;

  function onMove(e) {
    if (!dragging) return;
    const rect = duoGrid.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let pct = ((clientX - rect.left) / rect.width) * 100;
    pct = Math.max(MIN, Math.min(100 - MIN, pct));
    duoGrid.style.gridTemplateColumns = `${pct}% 6px ${100 - pct}%`;
  }
  function onUp() {
    if (!dragging) return;
    dragging = false;
    gutDuo.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
  function startDrag(e) {
    e.preventDefault();
    dragging = true;
    gutDuo.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  }
  gutDuo.addEventListener('mousedown', startDrag);
  gutDuo.addEventListener('touchstart', startDrag, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
  gutDuo.addEventListener('dblclick', () => duoGrid.style.gridTemplateColumns = '1fr 6px 1fr');
}

function bindUpload(i) {
  const uz = document.getElementById('uz'+i);
  if (!uz) return;
  uz.addEventListener('dragover',  e => { e.preventDefault(); uz.classList.add('drag'); });
  uz.addEventListener('dragleave', () => uz.classList.remove('drag'));
  uz.addEventListener('drop', e => {
    e.preventDefault(); uz.classList.remove('drag');
    const f = e.dataTransfer.files[0]; if (f) readFile(i, f);
  });
  const inp = document.getElementById('fi'+i);
  if (inp) inp.addEventListener('change', e => { const f = e.target.files[0]; if (f) readFile(i, f); });
}

function giroHTML(pi, giro) {
  const vis = giro.remessas.filter(r => r.estado!=='removido');
  const ent = giro.remessas.filter(r => r.estado==='confirmado').length;
  const tot = giro.remessas.length;
  const pct = tot>0 ? Math.round(ent/tot*100) : 0;

  // Agrupa remessas por produto (FALCON/ANDALUZ/etc), preservando a ordem do PDF
  const grupos = [];
  for (const r of giro.remessas) {
    const idxOriginal = giro.remessas.indexOf(r);
    if (r.estado === 'removido') continue;
    const last = grupos[grupos.length-1];
    if (last && last.produto === r.produto) {
      last.items.push({ r, ri: idxOriginal });
    } else {
      grupos.push({ produto: r.produto, items: [{ r, ri: idxOriginal }] });
    }
  }

  const gruposHTML = grupos.map(grp => `
    <div class="pgrupo">
      ${grp.produto ? `<div class="plabel">${grp.produto}</div>` : ''}
      <div class="rgrid">
        ${grp.items.map(({r,ri}) => tileHTML(pi, giro.num, ri, r)).join('')}
      </div>
    </div>`).join('');

  return `
<div class="gbloco" id="gb${pi}_${giro.num}">
  <div class="glabel">
    <span class="gnum">${giro.label || ('Giro ' + giro.num)}</span>
    <span class="gcnt">${vis.length} rem</span>
    <div class="gprog"><div class="gprogfill" style="width:${pct}%"></div></div>
    <span class="gstatus ${giro.status}">${giro.status}</span>
  </div>
  ${gruposHTML}
</div>`;
}

function tileHTML(pi, gn, ri, rem) {
  const m = (rem.modelo && rem.modelo!=='—' && rem.modelo!=='-') ? rem.modelo : '';
  return `
<div class="tile${rem.estado==='confirmado'?' done':''}" id="rt${pi}_${gn}_${ri}" onclick="handleClick(${pi},${gn},${ri})">
  ${m?`<div class="tmodel">${m}</div>`:''}
  <div class="tcode">${rem.codigo}</div>
</div>`;
}

// ── INTERAÇÃO DUPLO CLIQUE ──
function handleClick(pi, gn, ri) {
  const key = `${pi}_${gn}_${ri}`;
  const p   = plans[pi];
  const giro = p.giros.find(g => g.num===gn);
  if (!giro) return;
  const rem = giro.remessas[ri];
  if (!rem || rem.estado==='removido') return;

  const cs = cst[key] || {count:0, timer:null};
  cs.count++;
  if (cs.timer) clearTimeout(cs.timer);

  if (cs.count >= 2) {
    cst[key] = {count:0, timer:null};
    doAction(pi, gn, ri, rem, giro);
  } else {
    const el = document.getElementById(`rt${pi}_${gn}_${ri}`);
    if (el) el.classList.add('click1');
    cs.timer = setTimeout(() => {
      cst[key] = {count:0, timer:null};
      const el2 = document.getElementById(`rt${pi}_${gn}_${ri}`);
      if (el2) el2.classList.remove('click1');
    }, DBL_MS);
    cst[key] = cs;
  }
}

function doAction(pi, gn, ri, rem, giro) {
  const el = document.getElementById(`rt${pi}_${gn}_${ri}`);
  if (rem.estado === 'normal') {
    rem.estado = 'confirmado';
    if (el) { el.classList.remove('click1'); el.classList.add('done'); }
    updateGiroStatus(giro);
    rerenderStats(pi);
    updateStats();
    const suf = rem.modelo&&rem.modelo!=='—' ? ` — ${rem.modelo}` : '';
    toast(`✓ ${rem.codigo}${suf}`, 's');

    // Todas as OF do giro foram selecionadas -> giro finalizado, some da lista
    if (giro.status === 'completo' && !giro.logged) {
      giro.logged = true;
      logGiroCompleted(pi, giro);
      setTimeout(() => finishGiroAndCheck(pi, giro), 600);
    }
  } else if (rem.estado === 'confirmado') {
    if (el) {
      el.classList.add('out');
      // setTimeout em vez de 'animationend': o elemento pode ser substituído
      // (replaceWith) por um re-render concorrente de outro giro/remessa no
      // mesmo painel antes da animação terminar, e nesse caso o evento
      // 'animationend' nunca dispara (nó órfão), travando o estado.
      setTimeout(() => {
        rem.estado = 'removido';
        updateGiroStatus(giro);
        rerenderPanel(pi);
        updateStats();
      }, 280);
    } else {
      rem.estado = 'removido';
      updateGiroStatus(giro);
      rerenderPanel(pi);
      updateStats();
    }
  }
}

function rerenderPanel(i) {
  const old = document.getElementById('panel'+i);
  if (!old) return;
  const activeIdx = getActiveIdx();
  const mode = getLayoutMode(activeIdx);
  const solo = mode === 'solo' && activeIdx[0] === i;
  const duo  = mode === 'duo'  && activeIdx.includes(i);
  const tmp = document.createElement('div');
  tmp.innerHTML = panelHTML(i, {solo, duo});
  old.replaceWith(tmp.firstElementChild);
  bindUpload(i);
}

function rerenderStats(i) {
  const p = plans[i];
  let ent=0, pend=0;
  for (const g of p.giros) for (const r of g.remessas) {
    if (r.estado==='removido') continue;
    r.estado==='confirmado' ? ent++ : pend++;
  }
  const el = document.querySelector(`#panel${i} .pstats`);
  if (el) el.innerHTML = `<span class="ps-ok">✓${ent}</span><span style="color:#4a6a85"> / </span><span class="ps-pend">${pend}p</span>`;
}

// Anima o giro (100% concluído) saindo da tela e verifica se o plano inteiro terminou
function finishGiroAndCheck(pi, giro) {
  const gEl = document.getElementById(`gb${pi}_${giro.num}`);
  const proceed = () => {
    const p = plans[pi];
    const allDone = p.giros.length>0 && p.giros.every(g => g.status === 'completo');
    if (allDone) completePlan(pi);
    else rerenderPanel(pi);
  };
  if (gEl) {
    gEl.classList.add('gOut');
    // setTimeout em vez de 'animationend' pelo mesmo motivo do doAction():
    // garante que a checagem de "plano completo" sempre rode, mesmo que o
    // bloco do giro seja substituído por outro re-render antes do fim da
    // animação (o que faria o 'animationend' nunca disparar).
    setTimeout(proceed, 500);
  } else {
    proceed();
  }
}

// Todos os giros do plano finalizados -> painel some, avisa e libera para novo planejamento
function completePlan(pi) {
  const p = plans[pi];
  if (!p.plano) return; // já foi finalizado por outra chamada concorrente (dois giros terminando quase juntos)
  const nomeCompleto = p.plano;
  const id = getPlanIdentifier(p);
  toast(`✅ Planejamento ${id} foi entregue!`, 's');
  logPlanCompleted(pi, nomeCompleto, id);
  plans[pi] = {id:pi, plano:'', injetora:'', giros:[], justCompleted:true, completedName:id};
  // sempre que sobrar só 1 plano ativo (ou nenhum), volta pro modo maximizado automaticamente
  expandedView = false;
  renderAll();
}

function updateGiroStatus(giro) {
  const conf = giro.remessas.filter(r => r.estado==='confirmado').length;
  const tot  = giro.remessas.length;
  if (conf===tot)       giro.status = 'completo';
  else if (conf>0 || giro.remessas.some(r=>r.estado==='removido')) giro.status = 'iniciado';
  else giro.status = 'aguardando';
}

function updateStats() {
  let ent=0, pend=0, tot=0;
  for (const p of plans) for (const g of p.giros) for (const r of g.remessas) {
    tot++;
    (r.estado==='confirmado'||r.estado==='removido') ? ent++ : pend++;
  }
  document.getElementById('s-ent').textContent  = ent;
  document.getElementById('s-pend').textContent = pend;
  document.getElementById('s-tot').textContent  = tot;
}

function resetAll() {

// ── HISTÓRICO EM EXCEL (todos os dias trabalhados) ──
function buildHistoricoWorkbook() {
  if (typeof XLSX === 'undefined') return null;
  if (completedLog.length === 0 && completedPlansLog.length === 0) return null;

  const fmtData = ts => new Date(ts).toLocaleDateString('pt-BR');
  const fmtHora = ts => new Date(ts).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

  // ── Sheet 1: Resumo por dia ──
  const porDia = {};
  const bump = (ts, campo) => {
    const dia = fmtData(ts);
    if (!porDia[dia]) porDia[dia] = { ts, giros: 0, planos: 0 };
    porDia[dia][campo]++;
  };
  completedLog.forEach(e => bump(e.ts, 'giros'));
  completedPlansLog.forEach(e => bump(e.ts, 'planos'));
  const diasOrdenados = Object.values(porDia).sort((a,b) => a.ts - b.ts);
  const resumoRows = diasOrdenados.map(d => ({
    'Data': fmtData(d.ts),
    'Giros finalizados': d.giros,
    'Planejamentos entregues': d.planos
  }));

  // ── Sheet 2: Giros finalizados (detalhado) ──
  const girosRows = completedLog.slice().sort((a,b) => a.ts - b.ts).map(e => ({
    'Data'         : fmtData(e.ts),
    'Hora'         : fmtHora(e.ts),
    'Giro'         : e.giroLabel || '',
    'Identificação': e.injetora || '',
    'Planejamento' : e.plano || ''
  }));

  // ── Sheet 3: Planejamentos entregues (detalhado) ──
  const planosRows = completedPlansLog.slice().sort((a,b) => a.ts - b.ts).map(e => ({
    'Data'              : fmtData(e.ts),
    'Hora'              : fmtHora(e.ts),
    'Planejamento'      : e.id || '',
    'Descrição completa': e.plano || ''
  }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumoRows),  'Resumo por dia');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(girosRows),   'Giros finalizados');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(planosRows), 'Planejamentos entregues');
  return wb;
}

function downloadHistoricoExcel() {
  if (typeof XLSX === 'undefined') {
    toast('Não foi possível carregar a biblioteca de Excel (verifique a internet)', 'e');
    return;
  }
  const wb = buildHistoricoWorkbook();
  if (!wb) {
    toast('Ainda não há histórico registrado para baixar', 'w');
    return;
  }
  const hoje = new Date();
  const nomeArq = `historico-pcp-${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, nomeArq);
  toast('Histórico baixado em Excel!', 's');
}

// ── PASTA AUTOMÁTICA (File System Access API — Chrome/Edge) ──
// Depois de escolhida uma vez, o arquivo "historico-pcp.xlsx" dentro dela é
// sobrescrito sozinho, sem download nem clique, a cada giro/plano finalizado.
let historyDirHandle = null;
const FS_SUPPORTED = typeof window.showDirectoryPicker === 'function';

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('pcp_fs_store', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSaveDirHandle(handle) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'historyDir');
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbLoadDirHandle() {
  try {
    const db = await idbOpen();
    return await new Promise((resolve) => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('historyDir');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

function updateFolderStatus(state) {
  // state: 'connected' | 'reconnect' | 'off'
  const btn = document.getElementById('btnFolder');
  if (!btn) return;
  btn.classList.remove('connected');
  if (state === 'connected') {
    btn.textContent = '🔗 Pasta conectada';
    btn.classList.add('connected');
  } else if (state === 'reconnect') {
    btn.textContent = '⚠ Reconectar pasta';
  } else {
    btn.textContent = '🔗 Ativar pasta automática';
  }
}

async function chooseHistoryFolder() {
  if (!FS_SUPPORTED) {
    toast('Seu navegador não suporta essa função. Use Chrome ou Edge no computador.', 'e');
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    historyDirHandle = handle;
    await idbSaveDirHandle(handle);
    updateFolderStatus('connected');
    toast('Pasta conectada! O Excel será atualizado sozinho ali a partir de agora.', 's');
    await autoSaveHistoricoToFolder();
  } catch(e) {
    if (e.name !== 'AbortError') {
      console.error('Erro ao conectar pasta:', e);
      toast('Não foi possível conectar a pasta escolhida', 'e');
    }
  }
}

async function tryRestoreFolderOnBoot() {
  if (!FS_SUPPORTED) return;
  const handle = await idbLoadDirHandle();
  if (!handle) { updateFolderStatus('off'); return; }
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      historyDirHandle = handle;
      updateFolderStatus('connected');
    } else {
      // O Chrome exige um clique do usuário pra reconceder a permissão
      // depois de reiniciar o navegador — não dá pra pular essa etapa.
      updateFolderStatus('reconnect');
    }
  } catch(e) {
    updateFolderStatus('off');
  }
}

async function autoSaveHistoricoToFolder() {
  if (!historyDirHandle) return;
  try {
    const perm = await historyDirHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') { updateFolderStatus('reconnect'); return; }
    const wb = buildHistoricoWorkbook();
    if (!wb) return;
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const fileHandle = await historyDirHandle.getFileHandle('historico-pcp.xlsx', { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(new Blob([wbout], { type: 'application/octet-stream' }));
    await writable.close();
  } catch(e) {
    console.error('Erro ao salvar automaticamente na pasta:', e);
  }
}

// ── TOAST ──
function toast(msg, type='s') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── FILE READER ──
function readFile(si, file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) { toast('Envie um arquivo PDF','e'); return; }
  const uz = document.getElementById('uz'+si);
  const ut = document.getElementById('ut'+si);
  if (uz) uz.className = 'upzone loading';
  if (ut) ut.innerHTML = '<span class="spin"></span> Lendo PDF...';
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      await parsePdf(si, e.target.result, file.name);
    } catch(err) {
      const uz2 = document.getElementById('uz'+si);
      const ut2 = document.getElementById('ut'+si);
      if (uz2) uz2.className = 'upzone err';
      if (ut2) ut2.innerHTML = '❌ ' + err.message;
      toast('Erro: ' + err.message, 'e');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── PDF PARSER (PDF.js, sem worker) ──
// Detecta o formato do PDF e despacha para o parser correto:
//  - "PCP planejamento de injeção" (giros/remessas por coluna X)
//  - "Especial Acabados" (Agrupamento/OF/Modelo/Grade/Qtd, em texto corrido)
async function parsePdf(si, arrayBuf, filename) {
  if (typeof pdfjsLib === 'undefined') throw new Error('PDF.js não carregado');

  const loadTask = pdfjsLib.getDocument({ data: new Uint8Array(arrayBuf), disableWorker: true });
  const pdf = await loadTask.promise;

  // Extrai texto corrido de todas as páginas pra detectar o formato
  let fullText = '';
  for (let pn = 1; pn <= pdf.numPages; pn++) {
    const page = await pdf.getPage(pn);
    const tc   = await page.getTextContent();
    fullText  += tc.items.map(it => (it.str || '')).join('\n') + '\n';
  }

  if (/Agrupamento\s*:/i.test(fullText)) {
    return parseAcabadosPdf(si, fullText, filename);
  }
  return parseGiroPdf(si, pdf, filename);
}

// ── PARSER 1: PCP planejamento de injeção (giros/remessas — baseado em posição de coluna X) ──
async function parseGiroPdf(si, pdf, filename) {
  let plano = '', injetora = '';
  const RE_GIRO = /^\d{1,2}$/;
  const RE_REM  = /^\d{4,7}$/;

  const girosMap = {};
  let curNum = null;
  let curProduto = '';

  for (let pn = 1; pn <= pdf.numPages; pn++) {
    const page = await pdf.getPage(pn);
    const tc   = await page.getTextContent();
    const vp   = page.getViewport({ scale: 1 });

    // Converte itens para {x, top, text} (top = distância do topo da página)
    const items = [];
    for (const it of tc.items) {
      const s = (it.str || '').trim();
      if (!s) continue;
      items.push({ x: it.transform[4], top: vp.height - it.transform[5], text: s });
    }
    items.sort((a,b) => a.top - b.top || a.x - b.x);

    // Agrupa em linhas (tolerância 3px no eixo top)
    const rows = [];
    for (const it of items) {
      const last = rows[rows.length - 1];
      if (last && Math.abs(it.top - last.top) <= 3) {
        last.items.push(it);
        last.top = (last.top + it.top) / 2;
      } else {
        rows.push({ top: it.top, items: [it] });
      }
    }

    // Plano / injetora (apenas página 1, primeiras linhas)
    if (pn === 1) {
      for (let i = 0; i < Math.min(3, rows.length); i++) {
        const txt = rows[i].items.map(it => it.text).join(' ');
        if (txt.toLowerCase().includes('planejamento')) plano = txt.replace(/\s+/g,' ').trim();
        if (txt.toLowerCase().includes('injetora')) {
          injetora = txt.replace(/injetora\s*:?\s*/i,'').trim();
        }
      }
    }

    for (const row of rows) {
      const its = row.items.slice().sort((a,b) => a.x - b.x);

      // Detecta giro: 1º item x<40 dígito 1-2, 2º item x entre 90-150 é palavra MAIÚSCULA
      if (its.length >= 2) {
        const it0 = its[0], it1 = its[1];
        if (RE_GIRO.test(it0.text) && it0.x < 40 &&
            it1.x > 90 && it1.x < 150 &&
            /^[A-ZÀ-Ú]+$/.test(it1.text)) {
          const num = parseInt(it0.text);
          if (!girosMap[num]) girosMap[num] = { num, remessas: [] };
          curNum = num;
          curProduto = it1.text;
          continue;
        }
      }

      if (curNum === null) continue;

      // Detecta remessa: item na faixa de coluna "Remessa" (x 60-95) com código numérico
      for (const it of its) {
        if (it.x >= 60 && it.x <= 95 && RE_REM.test(it.text)) {
          const cod = it.text;
          // Modelo: item na faixa de coluna "Sola" (x 100-235) na mesma linha
          let modelo = '-';
          for (const it2 of its) {
            if (it2.x >= 100 && it2.x <= 235) { modelo = it2.text; break; }
          }
          const giro = girosMap[curNum];
          const dup  = giro.remessas.find(r => r.codigo === cod && r.produto === curProduto);
          if (!dup) giro.remessas.push({ codigo: cod, modelo, produto: curProduto });
          break;
        }
      }
    }
  }

  if (!plano) plano = filename.replace(/\.pdf$/i,'');

  const girosArr = Object.values(girosMap)
    .filter(g => g.remessas.length > 0)
    .sort((a,b) => a.num - b.num);

  if (!girosArr.length) throw new Error('Nenhum giro encontrado no PDF.');

  const p      = plans[si];
  p.plano      = plano;
  p.injetora   = injetora;
  p.giros      = girosArr.map(g => ({
    num      : g.num,
    label    : 'Giro ' + g.num,
    status   : 'aguardando',
    remessas : g.remessas.map(r => ({
      codigo : String(r.codigo || ''),
      modelo : String(r.modelo || '—'),
      produto: String(r.produto || ''),
      estado : 'normal'
    }))
  }));

  // Ao carregar um plano com sucesso, reavalia o layout ideal (solo/duo/grid)
  // em vez de manter forçado o modo "grade" que só serve pra abrir espaço
  // temporário na hora de inserir um novo planejamento.
  expandedView = false;
  renderAll();
  toast(`✓ ${p.plano}: ${p.giros.length} giros`, 's');
}

// ── PARSER 2: Especial Acabados (Agrupamento / OF / Modelo / Grade / Qtd — texto corrido) ──
function parseAcabadosPdf(si, fullText, filename) {
  let plano = '';
  const planoM = fullText.match(/Planejamento\s*:\s*([^\n]+)/i);
  if (planoM) plano = planoM[1].replace(/\s+/g,' ').trim();

  // Divide o texto em blocos por "Agrupamento:" (cada bloco vai até o próximo, ou fim do texto)
  const rawBlocks = fullText.split(/Agrupamento\s*:\s*/i).slice(1);
  if (!rawBlocks.length) throw new Error('Nenhum agrupamento encontrado no PDF.');

  const itens = [];
  for (const block of rawBlocks) {
    const nomeM  = block.match(/^\s*(\S+)/);
    const ofM    = block.match(/OF\s*:\s*(\d+)/i);
    const grdM   = block.match(/Grade\s*:\s*(\S+)/i);
    const qtdM   = block.match(/Qtd\s*:\s*(\d+)/i); // primeira ocorrência ("Qtd:"), não "Qtd. total"
    if (!nomeM || !ofM) continue;

    const agrupamento = nomeM[1].trim();
    const of    = ofM[1];
    const grade = grdM ? grdM[1].trim() : '';
    const qtd   = qtdM ? parseInt(qtdM[1]) : 1;

    itens.push({
      codigo : of,
      modelo : grade ? `Grade ${grade}${qtd>1 ? ' ×'+qtd : ''}` : (qtd>1 ? `×${qtd}` : ''),
      produto: agrupamento,
      estado : 'normal'
    });
  }

  if (!itens.length) throw new Error('Nenhum item (OF) encontrado no PDF.');
  if (!plano) plano = filename.replace(/\.pdf$/i,'');

  const p    = plans[si];
  p.plano    = plano;
  p.injetora = '';
  p.giros    = [{
    num      : 1,
    label    : 'Acabamento',
    status   : 'aguardando',
    remessas : itens
  }];

  expandedView = false;
  renderAll();
  toast(`✓ ${p.plano}: ${itens.length} OFs`, 's');
}
